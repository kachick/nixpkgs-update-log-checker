name: 💂➕
on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    timeout-minutes: 15
    runs-on: ubuntu-slim
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: 'Dependency Review'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
